<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog — Wisp</title>
  <meta name="description" content="Notes on building Wisp — a serverless runtime for AI agents.">

  <meta property="og:title" content="Wisp Blog">
  <meta property="og:description" content="Notes on building Wisp — a serverless runtime for AI agents.">
  <meta property="og:url" content="https://wisplab.org/blog/">
  <meta property="og:type" content="website">

  <link rel="icon" type="image/png" href="/logo.png">
  <link rel="apple-touch-icon" href="/logo.png">

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --fg: #f5f5f5;
      --muted: #a0a0a0;
      --dim: #555;
      --accent: #e8f0ff;
      --line: #222;
    }

    html, body { height: 100%; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      background: var(--bg);
      color: var(--fg);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 40px 24px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .container {
      max-width: 720px;
      width: 100%;
      margin: auto;
    }

    .nav {
      margin-bottom: 3rem;
      opacity: 0;
      animation: fadeIn 0.6s ease-out 0.1s forwards;
    }

    .nav a {
      color: var(--muted);
      text-decoration: none;
      font-size: 0.95rem;
      letter-spacing: -0.01em;
      border-bottom: none;
    }
    .nav a:hover { color: var(--fg); }

    h1 {
      font-size: clamp(2.5rem, 6vw, 3.5rem);
      font-weight: 200;
      letter-spacing: -0.03em;
      line-height: 1;
      margin-bottom: 0.6rem;
      background: linear-gradient(180deg, #fff 0%, #888 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      opacity: 0;
      animation: fadeIn 0.6s ease-out 0.2s forwards;
    }

    .tag {
      font-size: 1.1rem;
      color: var(--muted);
      margin-bottom: 4rem;
      font-weight: 300;
      letter-spacing: -0.01em;
      opacity: 0;
      animation: fadeIn 0.6s ease-out 0.3s forwards;
    }

    .posts {
      list-style: none;
      opacity: 0;
      animation: fadeIn 0.6s ease-out 0.4s forwards;
    }

    .post-item {
      padding: 1.4rem 0;
      border-top: 1px solid var(--line);
    }
    .post-item:last-child {
      border-bottom: 1px solid var(--line);
    }

    .post-date {
      display: block;
      font-size: 0.85rem;
      color: var(--dim);
      letter-spacing: 0.02em;
      margin-bottom: 0.4rem;
      font-variant-numeric: tabular-nums;
    }

    .post-title {
      font-size: 1.25rem;
      font-weight: 400;
      letter-spacing: -0.01em;
    }

    .post-title a {
      color: var(--fg);
      text-decoration: none;
      border-bottom: none;
    }
    .post-title a:hover { color: var(--accent); }

    .post-summary {
      margin-top: 0.5rem;
      color: var(--muted);
      font-size: 0.98rem;
      max-width: 600px;
    }

    .empty {
      padding: 3rem 0;
      color: var(--dim);
      font-size: 1rem;
      text-align: center;
      border-top: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
    }

    .footer {
      margin-top: 4rem;
      color: var(--dim);
      font-size: 0.9rem;
      opacity: 0;
      animation: fadeIn 0.6s ease-out 0.6s forwards;
    }

    .footer a {
      color: var(--muted);
      text-decoration: none;
      border-bottom: 1px solid var(--line);
    }
    .footer a:hover { color: var(--fg); border-bottom-color: var(--fg); }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 480px) {
      body { padding: 32px 20px; }
      h1 { font-size: 2.5rem; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="nav">
      <a href="/">← wisplab.org</a>
    </div>

    <h1>Blog</h1>
    <p class="tag">Notes on building Wisp.</p>

    <ul class="posts">
      <!--
        Add new posts at the top. Each post lives at /blog/<slug>/index.html.

        <li class="post-item">
          <span class="post-date">2026-05-02</span>
          <div class="post-title"><a href="/blog/wasi-python-in-wasmtime/">Running Python in Wasmtime, May 2026</a></div>
          <p class="post-summary">CPython 3.14 cross-compiled to wasm32-wasip1, running under Wasmtime 44, with measured cold-start numbers.</p>
        </li>
      -->
    </ul>

    <div class="empty">
      First post coming soon.
    </div>

    <div class="footer">
      <a href="/">wisplab.org</a> · <a href="https://github.com/wisplab">github</a> · <a href="mailto:hello@wisplab.org">hello@wisplab.org</a>
    </div>
  </div>
</body>
</html>
